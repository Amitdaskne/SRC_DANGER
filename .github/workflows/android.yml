name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Extract ZIP
        run: unzip SRC_DANGER.zip

      - name: Find gradlew
        run: find . -name gradlew

      - name: Build
        run: |
          chmod +x $(find . -name gradlew | head -1)
          DIR=$(dirname $(find . -name gradlew | head -1))
          cd "$DIR"
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: APK
          path: '**/*.apk'
